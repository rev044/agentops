title: AgentOps
description: The bookkeeping layer for coding agents. Memory, validation, and feedback loops that compound between sessions.
url: https://boshu2.github.io
baseurl: /agentops
theme: minima

include:
  - docs/comparisons

defaults:
  - scope:
      path: "docs/comparisons"
    values:
      layout: default
      nav_exclude: false

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

exclude:
  - cli/
  - skills/
  - hooks/
  - lib/
  - scripts/
  - tests/
  - bin/
  - schemas/
  - .agents/
  - .beads/
  - .claude/
  - .claude-plugin/
  - .github/
  - .opencode/
  - skills-codex/
  - skills-codex-overrides/
  - Makefile
  - go.mod
  - go.sum
  - "*.sh"
