title: AgentOps
description: The operational layer for coding agents. Memory, validation, and feedback loops that compound between sessions.
url: https://boshu2.github.io
baseurl: /agentops
theme: minima

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

header_pages:
  - docs/INDEX.md
  - docs/SKILLS.md
  - docs/comparisons/README.md
  - docs/FAQ.md

# Disable Liquid rendering on markdown files by default so Helm/Go templates
# and other code blocks don't break the build. Frontmatter still processed.
defaults:
  - scope:
      path: ""
      type: pages
    values:
      render_with_liquid: false
  - scope:
      path: "docs"
      type: pages
    values:
      layout: default
      render_with_liquid: false
  - scope:
      path: "docs/comparisons"
      type: pages
    values:
      layout: default
      render_with_liquid: false

# Only publish docs/ + top-level index. Exclude everything else.
exclude:
  - cli/
  - skills/
  - hooks/
  - lib/
  - scripts/
  - tests/
  - bin/
  - schemas/
  - .agents/
  - .beads/
  - .claude/
  - .claude-plugin/
  - .github/
  - .opencode/
  - skills-codex/
  - skills-codex-overrides/
  # Operational / non-user-facing subdirs
  - docs/evidence/
  - docs/migration-trackers/
  - docs/plans/
  - docs/profiles/
  - docs/releases/
  - docs/levels/
  # Files with Helm/Go template syntax that Jekyll's Liquid parser chokes on
  - docs/RELEASING.md
  - docs/workflows/
  - docs/standards/
  - docs/templates/kernel.template.md
  # Repo meta
  - AGENTS.md
  - GOALS.md
  - CLAUDE.md
  - README.md
  - Makefile
  - go.mod
  - go.sum
  - "*.sh"
