name: python-lib
description: Python library project
directives:
  - Maintain test coverage above 80%
  - Keep type annotations current
gates:
  - id: pytest
    description: Python tests pass
    check: pytest
    weight: 5
    type: health
  - id: mypy
    description: Type checking passes
    check: mypy .
    weight: 3
    type: quality
  - id: ruff
    description: Linter finds no issues
    check: ruff check .
    weight: 3
    type: quality
