name: generic
description: Generic project
directives:
  - Establish and maintain a passing test suite
  - Keep the build green on every commit
gates:
  - id: test
    description: Tests pass
    check: make test
    weight: 5
    type: health
  - id: lint
    description: Linter finds no issues
    check: make lint
    weight: 3
    type: quality
