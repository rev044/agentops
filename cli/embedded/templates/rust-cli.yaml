name: rust-cli
description: Rust CLI project
directives:
  - Maintain test coverage above 70%
  - Keep clippy clean with no warnings
gates:
  - id: cargo-build
    description: Rust project builds cleanly
    check: cargo build
    weight: 5
    type: health
  - id: cargo-test
    description: Rust tests pass
    check: cargo test
    weight: 5
    type: health
  - id: cargo-clippy
    description: Clippy finds no issues
    check: cargo clippy --all-targets -- -D warnings
    weight: 3
    type: quality
