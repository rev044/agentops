name: go-cli
description: Go CLI project
directives:
  - Maintain test coverage above 70%
  - Keep dependencies current
gates:
  - id: go-build
    description: Go project builds cleanly
    check: go build ./...
    weight: 5
    type: health
  - id: go-test
    description: Go tests pass
    check: go test ./...
    weight: 5
    type: health
  - id: go-vet
    description: Go vet finds no issues
    check: go vet ./...
    weight: 3
    type: health
