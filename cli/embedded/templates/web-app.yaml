name: web-app
description: Web application project
directives:
  - Maintain test coverage above 70%
  - Keep build passing on every commit
gates:
  - id: npm-test
    description: Tests pass
    check: npm test
    weight: 5
    type: health
  - id: npm-build
    description: Production build succeeds
    check: npm run build
    weight: 5
    type: health
  - id: tsc-check
    description: TypeScript type checking passes
    check: tsc --noEmit
    weight: 3
    type: quality
